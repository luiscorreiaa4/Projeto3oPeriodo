<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">
            <a href="./main.html">Nexus Consultoria</a>
        </div>
        <ul>
            <li><a href="./main.html">Home</a></li>
            <li><a href="./contato.html">Contato</a></li>
        </ul>
    </nav>
    <section id="contato" class="contact-section">
        <div class="container">
            <h2>Entre em Contato</h2>
            <p>Tem uma pergunta? Adoraríamos ouvir você.</p>
            
            <form class="contact-form">
                <div class="form-group">
                    <label for="name">Nome</label>
                    <input type="text" id="name" placeholder="Seu nome completo" required>
                </div>
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <label for="message">Mensagem</label>
                    <textarea id="message" rows="5" placeholder="Como podemos ajudar?" required></textarea>
                </div>
                <button type="submit" class="btn-submit">Enviar Mensagem</button>
            </form>
        </div>
    </section>
    <footer>
        <p>&copy; 2026 Nexus Consultoria. Nenhum direito reservado.</p>
    </footer>
</body>
</html>
