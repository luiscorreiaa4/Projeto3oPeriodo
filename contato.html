<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">
            <a href="./main.html">Nexus Consultoria</a>
        </div>
        <ul>
            <li><a href="./main.html">Home</a></li>
            <li><a href="./contato.html">Contato</a></li>
        </ul>
    </nav>
    <section id="contato" class="contact-section">
        <div class="container">
            <h2>Inicie sua Transformação</h2>
            <p>Agende um diagnóstico gratuito e descubra como a tecnologia pode trabalhar para você.</p>
            
            <form class="contact-form">
                <div class="form-group">
                    <label for="name">Nome da empresa</label>
                    <input type="text" id="name" placeholder="Ex: Alphabet Inc." required>
                </div>
                <div class="form-group">
                    <label for="email">E-mail corporativo</label>
                    <input type="email" id="email" placeholder="Ex: contato@empresa.com" required>
                </div>
                <div class="form-group">
                    <label for="desafio">Qual seu maior desafio tecnológico?</label>
                    <select id="desafio">
                        <option value=""> - </option>
                        <option value="custos">Reduzir custos operacionais</option>
                        <option value="automacao">Automatizar processos manuais</option>
                        <option value="seguranca">Segurança de dados e LGPD</option>
                        <option value="outro">Outro desafio estratégico</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="message">Mensagem (Opcional)</label>
                    <textarea id="message" rows="5" placeholder="Conte brevemente sobre sua operação atual..." required></textarea>
                </div>
                <button type="submit" class="btn-submit">Solicitar Diagnóstico Estratégico</button>
            </form>
        </div>
    </section>
    <footer>
        <p>&copy; 2026 Nexus Consultoria. Nenhum direito reservado.</p>
    </footer>
</body>
</html>
